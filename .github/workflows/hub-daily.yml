name: Hub Daily IMDB Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: streaming-hub

      - name: Run hub-imdb.js
        env:
          SUPABASE_URL: ${{ secrets.HUB_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.HUB_SUPABASE_KEY }}
        run: node scripts/hub-imdb.js
        working-directory: streaming-hub
